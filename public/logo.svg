<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Main diagonal gradient: purple → teal -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#7c3aed"/>
      <stop offset="55%"  stop-color="#5b21b6"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>

    <!-- Inner highlight (top-left glow) -->
    <radialGradient id="glow" cx="30" cy="28" r="52" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <!-- Left hemisphere clip (matches exact left-brain outline) -->
    <clipPath id="cl">
      <path d="M50,24 C43,20 34,20 27,25 C21,30 17,37 17,47 C17,57 21,65 27,70 C33,75 42,77 50,77 Z"/>
    </clipPath>

    <!-- Right hemisphere clip (matches exact right-brain outline) -->
    <clipPath id="cr">
      <path d="M50,24 C57,20 66,20 73,25 C79,30 83,37 83,47 C83,57 79,65 73,70 C67,75 58,77 50,77 Z"/>
    </clipPath>
  </defs>

  <!-- ── BACKGROUND ── -->
  <rect width="100" height="100" rx="22" fill="url(#bgGrad)"/>
  <rect width="100" height="100" rx="22" fill="url(#glow)"/>

  <!-- ── DECORATIVE ELEMENTS ── -->

  <!-- Top-left: outlined triangle + dots -->
  <path d="M12,11 L16,18 L8,18 Z" fill="none" stroke="white" stroke-width="0.9" opacity="0.26"/>
  <circle cx="8"  cy="25" r="1.1" fill="white" opacity="0.2"/>
  <circle cx="20" cy="9"  r="0.7" fill="white" opacity="0.16"/>

  <!-- Top-right: 4-point sparkle star + dot -->
  <path d="M88,10 L89.3,14 L88,18 L86.7,14 Z  M84,14 L88,12.7 L92,14 L88,15.3 Z"
        fill="white" opacity="0.28"/>
  <circle cx="93" cy="24" r="1.0" fill="white" opacity="0.18"/>

  <!-- Left side: × mark + dot -->
  <path d="M8,46 L13,51 M13,46 L8,51"
        stroke="white" stroke-width="1.1" stroke-linecap="round" opacity="0.22"/>
  <circle cx="10" cy="64" r="1.0" fill="white" opacity="0.17"/>

  <!-- Right side: scattered dots -->
  <circle cx="91" cy="42" r="1.3" fill="white" opacity="0.2"/>
  <circle cx="93" cy="58" r="0.8" fill="white" opacity="0.14"/>

  <!-- Bottom-left: outlined triangle + dot -->
  <path d="M13,83 L17,91 L9,91 Z" fill="none" stroke="white" stroke-width="0.9" opacity="0.2"/>
  <circle cx="22" cy="91" r="0.8" fill="white" opacity="0.14"/>

  <!-- Bottom-right: × mark + dot -->
  <path d="M84,83 L89,88 M89,83 L84,88"
        stroke="white" stroke-width="1.1" stroke-linecap="round" opacity="0.2"/>
  <circle cx="91" cy="91" r="1.1" fill="white" opacity="0.15"/>

  <!-- Bottom area: small 4-point star -->
  <path d="M71,89 L72,92 L75,89 L72,86 Z  M68,89 L72,88 L75,89 L72,90 Z"
        fill="white" opacity="0.2"/>

  <!-- ── RIGHT HEMISPHERE SUBTLE FILL (clarity/light) ── -->
  <path d="M50,24 C57,20 66,20 73,25 C79,30 83,37 83,47 C83,57 79,65 73,70 C67,75 58,77 50,77 Z"
        fill="white" opacity="0.07"/>

  <!-- ── BRAIN OUTLINE ── -->
  <path d="
    M 50,24
    C 57,20 66,20 73,25
    C 79,30 83,37 83,47
    C 83,57 79,65 73,70
    C 67,75 58,77 50,77
    C 42,77 33,75 27,70
    C 21,65 17,57 17,47
    C 17,37 21,30 27,25
    C 34,20 43,20 50,24 Z"
    fill="none" stroke="white" stroke-width="2.2" stroke-linejoin="round"/>

  <!-- Longitudinal fissure (centre groove, slight natural curve) -->
  <path d="M50,24 C49,37 49,59 50,77"
        fill="none" stroke="white" stroke-width="1.3"
        stroke-linecap="round" opacity="0.62"/>

  <!-- ── LEFT HEMISPHERE · Chaotic tangled lines ── -->
  <g clip-path="url(#cl)" fill="none">
    <!-- Overlapping loop 1 – upper area -->
    <path d="M34,33 C23,32 20,41 31,39 C42,37 39,29 28,31 C21,33 21,42 33,40"
          stroke="white" stroke-width="1.4" stroke-linecap="round" opacity="0.88"/>
    <!-- Overlapping loop 2 – centre area -->
    <path d="M41,51 C22,49 18,61 33,58 C47,55 43,43 26,46 C17,48 19,62 35,59"
          stroke="white" stroke-width="1.3" stroke-linecap="round" opacity="0.82"/>
    <!-- Overlapping loop 3 – lower area -->
    <path d="M30,66 C21,62 20,72 31,70 C42,68 39,59 29,63"
          stroke="white" stroke-width="1.1" stroke-linecap="round" opacity="0.72"/>
    <!-- Short chaotic strokes -->
    <path d="M43,37 C47,33 49,39 45,41"
          stroke="white" stroke-width="1.0" stroke-linecap="round" opacity="0.62"/>
    <path d="M44,61 C48,57 49,63 45,65"
          stroke="white" stroke-width="1.0" stroke-linecap="round" opacity="0.58"/>
    <!-- Scattered interior dots -->
    <circle cx="25" cy="50" r="1.3" fill="white" opacity="0.50"/>
    <circle cx="38" cy="39" r="0.9" fill="white" opacity="0.42"/>
    <circle cx="37" cy="67" r="0.9" fill="white" opacity="0.40"/>
    <circle cx="45" cy="47" r="0.7" fill="white" opacity="0.36"/>
  </g>

  <!-- ── RIGHT HEMISPHERE · Clean focused road ── -->
  <g clip-path="url(#cr)" fill="none">
    <!-- Main smooth path: S-curve from upper-centre toward bottom-right -->
    <path d="M53,30 C60,40 66,49 69,58 C72,67 70,73 68,74"
          stroke="white" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Subtle parallel lane line -->
    <path d="M56,28 C63,38 68,49 71,58 C74,67 72,74 70,75"
          stroke="white" stroke-width="0.9" stroke-linecap="round" opacity="0.26"/>
    <!-- Destination dot (end of road) -->
    <circle cx="68" cy="74" r="2.6" fill="white" opacity="0.88"/>
    <!-- Mid-path pulse dot -->
    <circle cx="63" cy="49" r="1.2" fill="white" opacity="0.42"/>
  </g>
</svg>
